# DKMS configuration for iextend-evdi (upstream evdi kernel module 1.14.7)
#
# This file is placed under /usr/src/iextend-evdi-1.14.7/dkms.conf by the
# Debian postinst / RPM %post scriptlet.  DKMS reads it automatically when
# it builds the module for each installed kernel.
#
# License boundary: evdi is GPL-licensed.  This package is separate from the
# Apache-2.0 iextend daemon binary.  See host/packaging/linux/evdi-dkms/README.md.

PACKAGE_NAME="iextend-evdi"
PACKAGE_VERSION="1.14.7"

# Source layout: evdi's Makefile expects to be run from the module/ subdir.
CLEAN="make -C module clean"
MAKE[0]="make -C module KVERSION=${kernelver}"

BUILT_MODULE_NAME[0]="evdi"
BUILT_MODULE_LOCATION[0]="module"
DEST_MODULE_LOCATION[0]="/kernel/drivers/gpu/drm/evdi"

# Automatically rebuild on kernel update.
AUTOINSTALL="yes"

# Regenerate the initramfs after install so the module is available at boot
# (needed for compositors that start before /usr/lib is mounted on some
# systemd configurations).
REMAKE_INITRD="yes"

# Load with exactly one virtual monitor device node (users can adjust via
# /etc/modprobe.d/iextend-evdi.conf).
MODULES_CONF[0]="options evdi initial_device_count=1"

# Sign the module if our signing key is present (SecureBoot path).
# The postinst generates /var/lib/iextend/MOK.{priv,der}.
# sign-evdi-module.sh is installed to /usr/lib/iextend/ by the package.
POST_BUILD="
if [ -f /var/lib/iextend/MOK.priv ] && [ -f /var/lib/iextend/MOK.der ]; then
    /usr/lib/iextend/sign-evdi-module.sh ${kernelver} ${PKGDEST}/${BUILT_MODULE_NAME[0]}.ko
fi
"
