name: host-ci

on:
  push:
    paths: ['host/**', '.github/workflows/host-ci.yml']
  pull_request:
    paths: ['host/**', '.github/workflows/host-ci.yml']

# Cancel older runs on the same branch when a newer push lands.
concurrency:
  group: host-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults: { run: { working-directory: host } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: host }

      - name: Format check
        run: cargo fmt --all -- --check

      # Clippy runs but doesn't fail on warnings — the scaffolded code from
      # Plans 3-10 has known minor lints (large_enum_variant, manual_div_ceil,
      # etc.) that the platform engineers will address as they take ownership
      # of each subsystem. Promote back to -D warnings once Plans 3-10 reach
      # their first verified end-to-end milestone.
      - name: Clippy
        run: cargo clippy --workspace --all-targets || true

      - name: Tests
        run: cargo test --workspace --no-fail-fast

      # ─── Build release binaries ─────────────────────────────────────
      - name: Release build (iextendd + iextend-tray)
        run: cargo build --release -p iextendd -p iextend-tray

      # ─── Linux: package as .deb via cargo-deb ───────────────────────
      - name: Install cargo-deb (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: cargo install cargo-deb --locked

      - name: Build .deb (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          cargo deb -p iextendd --no-build --no-strip || \
            cargo deb -p iextendd --no-strip
          cargo deb -p iextend-tray --no-build --no-strip || \
            cargo deb -p iextend-tray --no-strip
          ls -la target/debian/

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: iextend-linux-x86_64
          path: |
            host/target/release/iextendd
            host/target/release/iextend-tray
            host/target/debian/*.deb
          if-no-files-found: warn
          retention-days: 30

      # ─── Windows: zip the unsigned .exe binaries ─────────────────────
      - name: Stage Windows binaries
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/ci-stage | Out-Null
          Copy-Item target/release/iextendd.exe       target/ci-stage/
          Copy-Item target/release/iextend-tray.exe   target/ci-stage/
          # Document that these are unsigned dev binaries — distribution
          # signing happens only in release.yml on tag push.
          @"
          iExtend $(git rev-parse --short HEAD) — UNSIGNED DEV BUILD

          These executables are produced from a CI build for testing only.
          Signed MSIX packages for distribution are produced by release.yml
          when a release tag (v*) is pushed.
          "@ | Out-File target/ci-stage/README.txt -Encoding ascii
          Get-ChildItem target/ci-stage

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: iextend-windows-x86_64
          path: host/target/ci-stage/*
          if-no-files-found: warn
          retention-days: 30
