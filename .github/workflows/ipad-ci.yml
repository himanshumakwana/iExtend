name: ipad-ci

# Runs `xcodebuild` against the iPad app on every push / PR that touches the
# iPad tree. Builds for the iOS Simulator (no signing required) and runs the
# Swift Package unit tests where they exist.
#
# Code signing for distribution (TestFlight / App Store) lives in release.yml,
# which fires on tag push and uses fastlane match.

on:
  push:
    paths: ['ipad/**', '.github/workflows/ipad-ci.yml']
  pull_request:
    paths: ['ipad/**', '.github/workflows/ipad-ci.yml']

# Limit concurrent runs per branch — newer pushes cancel older ones.
concurrency:
  group: ipad-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15      # ships Xcode 16.x on the GitHub-hosted image
    defaults: { run: { working-directory: ipad } }
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

    steps:
      - uses: actions/checkout@v4
        with:
          # WebRTC.framework would arrive via Git LFS once vendored. The fetch
          # is harmless if no LFS objects exist yet.
          lfs: true

      - name: Xcode + Swift versions
        run: |
          xcodebuild -version
          swift --version

      # The macos-15 GitHub-hosted image ships Xcode 16.x with the iOS SDK
      # but the simulator runtime is occasionally absent (Apple ships them
      # as on-demand downloads). `xcodebuild -downloadPlatform iOS` pulls a
      # matching runtime if missing — idempotent when already installed.
      - name: Ensure iOS platform / simulator runtime
        run: |
          set -eo pipefail
          xcodebuild -runFirstLaunch || true
          # The download is large (~7 GB) and slow but cached by GH between
          # runs via the Xcode toolchain cache. If `-downloadPlatform` errors
          # out (sometimes flaky), the build steps will surface a clearer
          # error message anyway.
          sudo xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true
          # Show what's actually available so failure logs are diagnosable.
          xcrun simctl list runtimes
          xcodebuild -showsdks | grep -E 'iOS|iphoneos' || true

      # WebRTC.framework binary (~280 MB) is not checked in (see
      # ipad/Frameworks/README.md). For CI we download a known-good stasel
      # build the first time and cache it. If the URL changes, bump the
      # cache key and the curl line.
      - name: Cache WebRTC.framework
        id: webrtc-cache
        uses: actions/cache@v4
        with:
          path: ipad/Frameworks/WebRTC.xcframework
          key: webrtc-xcframework-M141-v1

      - name: Download WebRTC.xcframework (stasel build)
        if: steps.webrtc-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p Frameworks
          # stasel publishes signed Apple-platform builds at
          #   https://github.com/stasel/WebRTC/releases
          # Asset filename is WebRTC-M<N>.xcframework.zip — pin a known tag.
          curl -L --fail \
            -o /tmp/WebRTC.xcframework.zip \
            https://github.com/stasel/WebRTC/releases/download/141.0.0/WebRTC-M141.xcframework.zip
          unzip -q /tmp/WebRTC.xcframework.zip -d Frameworks/
          ls Frameworks/

      # iExtend.xcodeproj is not committed — we generate it from
      # ipad/project.yml at CI time so neither the .pbxproj nor the
      # workspace settings have to live in git. The XcodeGen spec lists
      # the local SwiftPM package + WebRTC.xcframework as deps; the result
      # is a normal Xcode project that the steps below build/test/archive.
      - name: Generate iExtend.xcodeproj (XcodeGen)
        run: |
          set -eo pipefail
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen generate --spec project.yml
          test -f iExtend.xcodeproj/project.pbxproj

      - name: Detect Xcode project
        id: detect-xcodeproj
        run: |
          if [ -f iExtend.xcodeproj/project.pbxproj ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::iExtend.xcodeproj found — running full Xcode pipeline."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::iExtend.xcodeproj/project.pbxproj missing — skipping xcodebuild steps. Falling back to swift test for SwiftPM packages."
          fi

      - name: Resolve SwiftPM dependencies
        if: steps.detect-xcodeproj.outputs.exists == 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -project iExtend.xcodeproj \
            -scheme iExtend

      # Simulator build is intentionally skipped on the macos-15 runner —
      # Apple's "platform on-demand" model means iOS 18.2 (the SDK
      # bundled with Xcode_16.2) doesn't ship a matching simulator
      # runtime; what's preinstalled is iOS 18.5 / 18.6 / 26.x. Mixing
      # SDK 18.2 with a 18.5+ runtime confuses the destination resolver.
      # We don't need a simulator build for the unsigned-IPA goal anyway,
      # so the device build below is the only actual compile path.
      - name: Skip simulator build (see comment in workflow)
        if: steps.detect-xcodeproj.outputs.exists == 'true'
        run: |
          echo "::notice::Skipping simulator build — using -sdk iphoneos for the device-only path. The unsigned IPA produced below is what AltStore consumes."

      # SwiftPM-level tests (the iExtendKit / iExtendUI / iExtendInput packages
      # have their own XCTest targets). These only depend on swift-crypto +
      # swift-atomics + the WebRTC binary above.
      #
      # iOS-only files (UIKit, CADisplayLink in iOS form, etc.) live behind
      # `#if canImport(UIKit)` so swift test can validate the manifest +
      # cross-platform code on the macOS host. Real iOS-target tests will
      # land via the xcodebuild step above once iExtend.xcodeproj is committed.
      - name: Swift package tests
        if: hashFiles('ipad/Package.swift') != ''
        run: |
          set -eo pipefail
          swift test --parallel --enable-code-coverage 2>&1 | tee swift-test.log

      # ─── Simulator artifact dropped intentionally ───────────────────
      # Earlier we staged a Simulator-built .app for reviewers to drop into
      # Xcode. That path is dead now: macos-15 ships SDK 18.2 but only
      # 18.5+ simulator runtimes, so a Simulator build can't be produced
      # without an extra (slow) runtime install. The unsigned IPA below
      # is the actual deliverable AltStore consumes.

      # ─── Unsigned device .ipa ───────────────────────────────────────
      # Builds for `generic/platform=iOS` (real device target) with all
      # signing disabled, then packages the resulting iExtend.app into a
      # zip with a Payload/ root — that is, a valid .ipa structure that
      # just isn't signed. Cannot install on a real device as-is, but is
      # downloadable + re-signable via Sideloadly / AltStore / etc.
      # release.yml builds the proper TestFlight-signed .ipa on tag push.
      - name: Build unsigned IPA (iOS device)
        if: steps.detect-xcodeproj.outputs.exists == 'true'
        run: |
          set -eo pipefail
          rm -rf build Payload iExtend-unsigned.ipa
          # Use `xcodebuild archive` (not `build`) — archive is the
          # canonical "build for distribution" entry point and is
          # tolerant of no-device-attached, no-simulator-runtime CI
          # boxes that defeat plain `build`. The resulting .xcarchive
          # contains the unsigned .app under
          # Products/Applications/iExtend.app which we then re-pack as
          # an unsigned Payload/iExtend.ipa for AltStore consumption.
          xcodebuild archive \
            -project iExtend.xcodeproj \
            -scheme iExtend \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/iExtend.xcarchive \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_BITCODE=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            2>&1 | tee ipa-build.log | xcbeautify --renderer github-actions

          APP_PATH="build/iExtend.xcarchive/Products/Applications/iExtend.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::iExtend.app not found at $APP_PATH"
            find build -name "iExtend.app" -type d || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr iExtend-unsigned.ipa Payload
          ls -lh iExtend-unsigned.ipa
          unzip -l iExtend-unsigned.ipa | head -10

      - name: Upload unsigned IPA artifact
        if: steps.detect-xcodeproj.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: iextend-ipad-ipa-unsigned
          path: ipad/iExtend-unsigned.ipa
          if-no-files-found: error
          retention-days: 30

      # ─── SwiftPM-only artifact upload (always, even without Xcode project) ─
      - name: Stage SwiftPM build for upload
        if: hashFiles('ipad/Package.swift') != ''
        run: |
          set -euo pipefail
          mkdir -p ci-stage-spm
          if [ -d .build/debug ]; then
            # Copy SPM build outputs (libraries + tests). Useful for diffing
            # symbol exports between commits even when Xcode project is missing.
            # `.build/debug` is a relative symlink (→ arm64-apple-macosx/debug);
            # use `-L` to dereference, otherwise the upload step finds an empty
            # ci-stage-spm/ and silently uploads nothing.
            cp -RL .build/debug/ ci-stage-spm/debug/ 2>/dev/null || true
          fi
          ls -la ci-stage-spm/ || true

      - name: Upload SwiftPM artifact
        if: hashFiles('ipad/Package.swift') != ''
        uses: actions/upload-artifact@v4
        with:
          name: iextend-ipad-swiftpm-debug
          path: ipad/ci-stage-spm/
          if-no-files-found: ignore
          retention-days: 14
